<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get Product Image</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <script src="https://storage.owndays.com/storage/js/tailwind-3.4.16.min.js"></script>
  <script>
    tailwind.config = {
      corePlugins: {
        preflight: false, container: false,
      },
      theme: {
        extend: {
          screens: {
            xl: '1296px', xxl: '1440px', xxxl: '1600px',
          },
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
            mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
          },
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    }
    @keyframes pulse-soft {
      0%, 100% { opacity: 1; }
      50% { opacity: .5; }
    }
    .animate-pulse-soft { animation: pulse-soft 1.5s ease-in-out infinite; }
  </style>
</head>
<body class="font-sans antialiased min-h-screen bg-slate-950 text-slate-100">
  <!-- background -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none" aria-hidden="true">
    <div class="absolute -top-32 -left-32 w-96 h-96 rounded-full bg-sky-600/20 blur-3xl"></div>
    <div class="absolute top-1/3 -right-24 w-80 h-80 rounded-full bg-cyan-600/15 blur-3xl"></div>
    <div class="absolute -bottom-24 left-1/3 w-96 h-96 rounded-full bg-blue-600/10 blur-3xl"></div>
  </div>

  <div class="relative max-w-3xl mx-auto px-4 py-10 sm:py-14">
    <!-- header -->
    <header class="mb-8 text-center">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-br from-sky-500 to-blue-600 shadow-lg shadow-sky-500/30 mb-4">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3.75 21h16.5A2.25 2.25 0 0022.5 18.75V5.25A2.25 2.25 0 0020.25 3H3.75A2.25 2.25 0 001.5 5.25v13.5A2.25 2.25 0 003.75 21z"/>
        </svg>
      </div>
      <h1 class="text-3xl sm:text-4xl font-bold tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">
        Get Product Image
      </h1>
      <p class="mt-3 text-slate-400 text-sm sm:text-base max-w-lg mx-auto leading-relaxed">
        ดึง URL รูปสินค้าจากหน้า Product detail page ของ OWNDAYS
      </p>
    </header>

    <!-- input card -->
    <section class="rounded-2xl border border-white/10 bg-white/5 backdrop-blur-xl shadow-2xl shadow-black/20 p-5 sm:p-6 mb-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-wider">Product URLs</h2>
        <span id="url-count" class="text-xs text-slate-500 bg-slate-800/80 px-2.5 py-1 rounded-full">4 URLs</span>
      </div>

      <div id="url-inputs" class="space-y-2.5 mb-5"></div>

      <div class="flex flex-col items-center gap-2.5">
        <button id="add-text-box" type="button" class="inline-flex items-center justify-center gap-1.5 w-full max-w-xs px-4 py-2.5 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10 text-slate-300 text-sm font-medium transition-all duration-200">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
          Add URL
        </button>
        <button id="fetch-images" type="button" class="inline-flex items-center justify-center gap-2 w-full max-w-xs px-5 py-2.5 rounded-xl border-0 outline-none bg-gradient-to-r from-sky-500 to-blue-600 hover:from-sky-400 hover:to-blue-500 text-white text-sm font-semibold shadow-lg shadow-sky-500/25 transition-all duration-200 hover:shadow-sky-500/40 active:translate-y-0">
          <svg id="fetch-icon" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12M12 16.5V3"/></svg>
          <span id="fetch-label">ดึง URL รูป</span>
        </button>
      </div>
    </section>

    <!-- status -->
    <div id="status" class="hidden mb-4"></div>

    <!-- results -->
    <section id="results-section" class="hidden rounded-2xl border border-white/10 bg-white/5 backdrop-blur-xl shadow-2xl shadow-black/20 p-5 mt-6 sm:p-6">
      <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-wider mb-4">Results</h2>
      <div id="result"></div>
    </section>
  </div>

  <script>
    const urlInputsContainer = document.getElementById('url-inputs');
    const addTextBoxBtn = document.getElementById('add-text-box');
    const fetchImagesBtn = document.getElementById('fetch-images');
    const fetchLabel = document.getElementById('fetch-label');
    const resultEl = document.getElementById('result');
    const resultsSection = document.getElementById('results-section');
    const statusEl = document.getElementById('status');
    const urlCountEl = document.getElementById('url-count');

    const INPUT_CLASS = 'url-input w-full bg-slate-900/60 border border-white/10 rounded-xl px-4 py-2.5 pl-10 text-sm text-slate-200 placeholder:text-slate-600 focus:outline-none focus:border-sky-500/50 focus:ring-2 focus:ring-sky-500/20 transition-all duration-200';
    const INPUT_ERROR_CLASS = ['!border-red-500/50', '!ring-2', '!ring-red-500/20'];

    function validateProductUrl(urlString) {
      let url;
      try {
        url = new URL(urlString.trim());
      } catch {
        return { valid: false, error: 'URL ไม่ถูกต้อง' };
      }

      if (url.protocol !== 'https:') {
        return { valid: false, error: 'URL ต้องขึ้นต้นด้วย https://' };
      }

      if (url.hostname !== 'www.owndays.com') {
        return { valid: false, error: 'รองรับเฉพาะ www.owndays.com' };
      }

      if (!/^\/[a-z]{2}\/[a-z]{2}\/products\/[A-Za-z0-9_-]+\/?$/i.test(url.pathname)) {
        return { valid: false, error: 'URL ต้องอยู่ในรูปแบบ /{country}/{lang}/products/{product-code}' };
      }

      const sku = url.searchParams.get('sku');
      if (!sku || !sku.trim()) {
        return { valid: false, error: 'URL ต้องมีพารามิเตอร์ ?sku=' };
      }

      return { valid: true, sku: sku.trim() };
    }

    function clearInputErrors() {
      document.querySelectorAll('.url-input').forEach((input) => {
        input.classList.remove(...INPUT_ERROR_CLASS);
      });
    }

    function markInvalidInput(input) {
      input.classList.add(...INPUT_ERROR_CLASS);
    }

    function updateUrlCount() {
      const rows = urlInputsContainer.querySelectorAll('.url-row');
      const count = rows.length;
      urlCountEl.textContent = `${count} URL${count > 1 ? 's' : ''}`;
      rows.forEach((row) => {
        const btn = row.querySelector('.remove-row');
        if (btn) btn.style.display = count > 1 ? '' : 'none';
      });
    }

    function getSkuFromUrl(pageUrl) {
      try {
        return new URL(pageUrl).searchParams.get('sku');
      } catch {
        return null;
      }
    }

    function normalizeUrl(urlString) {
      try {
        return new URL(urlString.trim()).href;
      } catch {
        return urlString.trim();
      }
    }

    const fetchedCache = new Map();

    function isAlreadyFetched(pageUrl) {
      const cached = fetchedCache.get(normalizeUrl(pageUrl));
      return cached && cached.imageUrl && !cached.error;
    }

    function buildResultsFromUrls(urls) {
      return urls
        .map((url) => fetchedCache.get(normalizeUrl(url)))
        .filter(Boolean);
    }

    function showStatus(message, type = 'info') {
      const styles = {
        info: 'bg-blue-500/10 border-blue-500/20 text-blue-300',
        success: 'bg-emerald-500/10 border-emerald-500/20 text-emerald-300',
        error: 'bg-red-500/10 border-red-500/20 text-red-300',
        loading: 'bg-sky-500/10 border-sky-500/20 text-sky-300',
      };
      statusEl.className = `flex items-center gap-2 px-4 py-3 rounded-xl border text-sm ${styles[type] || styles.info}`;
      statusEl.innerHTML = type === 'loading'
        ? `<span class="w-2 h-2 rounded-full bg-sky-400 animate-pulse-soft"></span><span class="truncate">${message}</span>`
        : `<span>${message}</span>`;
    }

    function hideStatus() {
      statusEl.className = 'hidden';
      statusEl.innerHTML = '';
    }

    function renderResults(items) {
      if (items.length === 0) {
        resultsSection.classList.add('hidden');
        resultEl.innerHTML = '';
        return;
      }

      resultsSection.classList.remove('hidden');
      resultEl.innerHTML = `<div class="space-y-3">${items.map(({ sku, imageUrl, error }) => {
        const skuBadge = sku
          ? `<span class="inline-flex items-center px-2.5 py-0.5 rounded-lg bg-sky-500/15 text-sky-300 text-xs font-semibold tracking-wide">SKU: ${sku}</span>`
          : `<span class="inline-flex items-center px-2.5 py-0.5 rounded-lg bg-slate-700/60 text-slate-400 text-xs font-medium">SKU: ไม่พบ</span>`;

        if (error) {
          return `
            <div class="result-item rounded-xl border border-red-500/20 bg-red-500/5 p-4">
              <div class="mb-2">${skuBadge}</div>
              <p class="text-red-400 text-sm">${error}</p>
            </div>
          `;
        }

        return `
          <div class="result-item rounded-xl border border-white/10 bg-slate-900/40 p-4 hover:border-white/20 transition-colors duration-200">
            <div class="flex gap-4 items-center">
              <a href="${imageUrl}" target="_blank" class="shrink-0 w-16 rounded-lg overflow-hidden bg-slate-800 border border-white/10">
                <img src="${imageUrl}" alt="SKU ${sku || ''}" class="w-full h-auto block">
              </a>
              <div class="flex-1 min-w-0">
                <div class="mb-2">${skuBadge}</div>
                <p class="font-mono text-xs text-slate-400 break-all leading-relaxed">${imageUrl}</p>
              </div>
              <button type="button" class="copy-url shrink-0 self-start inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-white/10 bg-white/5 hover:bg-sky-500/20 hover:border-sky-500/30 text-slate-400 hover:text-sky-300 text-xs font-medium transition-all duration-200" data-url="${imageUrl}">
                <svg class="w-3.5 h-3.5 copy-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0013.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 01-.75.75H9.75a.75.75 0 01-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 01-2.25 2.25H6.75A2.25 2.25 0 014.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0111.186 0z"/></svg>
                <span class="copy-label">Copy</span>
              </button>
            </div>
          </div>
        `;
      }).join('')}</div>`;
    }

    resultEl.addEventListener('click', async (e) => {
      const btn = e.target.closest('.copy-url');
      if (!btn) return;

      const url = btn.dataset.url;
      const label = btn.querySelector('.copy-label');
      try {
        await navigator.clipboard.writeText(url);
        label.textContent = 'Copied!';
        btn.classList.add('!bg-emerald-500/20', '!border-emerald-500/30', '!text-emerald-300');
        setTimeout(() => {
          label.textContent = 'Copy';
          btn.classList.remove('!bg-emerald-500/20', '!border-emerald-500/30', '!text-emerald-300');
        }, 1500);
      } catch {
        label.textContent = 'Failed';
        setTimeout(() => { label.textContent = 'Copy'; }, 1500);
      }
    });

    function createUrlRow() {
      const row = document.createElement('div');
      row.className = 'url-row flex gap-2 items-center';
      row.innerHTML = `
        <div class="relative flex-1">
          <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-600 pointer-events-none" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m9.86-2.54a4.5 4.5 0 00-6.364-6.364l-4.5 4.5a4.5 4.5 0 001.242 7.244"/></svg>
          <input type="url" class="${INPUT_CLASS}" placeholder="https://www.owndays.com/jp/ja/products/OB2020G-5A?sku=9215">
        </div>
        <button type="button" class="remove-row shrink-0 w-10 h-10 flex items-center justify-center rounded-xl border border-white/10 bg-white/5 hover:bg-red-500/15 hover:border-red-500/30 text-slate-500 hover:text-red-400 transition-all duration-200" title="ลบ">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      `;
      row.querySelector('.remove-row').addEventListener('click', () => {
        if (urlInputsContainer.querySelectorAll('.url-row').length > 1) {
          row.remove();
          updateUrlCount();
        }
      });
      return row;
    }

    addTextBoxBtn.addEventListener('click', () => {
      urlInputsContainer.appendChild(createUrlRow());
      updateUrlCount();
      urlInputsContainer.lastElementChild.querySelector('.url-input').focus();
    });

    urlInputsContainer.addEventListener('input', (e) => {
      if (e.target.classList.contains('url-input')) {
        e.target.classList.remove(...INPUT_ERROR_CLASS);
      }
    });

    async function fetchImageUrl(pageUrl) {
      const response = await fetch('/api/fetch-image', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: pageUrl }),
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || 'Request failed');
      return data.imageUrl;
    }

    function setLoading(loading) {
      fetchImagesBtn.disabled = loading;
      addTextBoxBtn.disabled = loading;
      if (loading) {
        fetchLabel.textContent = 'กำลังดึง...';
        fetchImagesBtn.classList.add('opacity-70', 'cursor-not-allowed');
      } else {
        fetchLabel.textContent = 'ดึง URL รูป';
        fetchImagesBtn.classList.remove('opacity-70', 'cursor-not-allowed');
      }
    }

    fetchImagesBtn.addEventListener('click', async () => {
      const entries = [...document.querySelectorAll('.url-input')]
        .map((input) => ({ input, url: input.value.trim() }))
        .filter(({ url }) => url);

      if (entries.length === 0) {
        showStatus('กรุณากรอก URL อย่างน้อย 1 รายการ', 'error');
        return;
      }

      clearInputErrors();
      const invalidEntries = entries.filter(({ url }) => !validateProductUrl(url).valid);

      if (invalidEntries.length > 0) {
        invalidEntries.forEach(({ input }) => markInvalidInput(input));
        showStatus(
          `URL ไม่ถูกต้อง ${invalidEntries.length} รายการ — ต้องอยู่ในรูปแบบ https://www.owndays.com/jp/ja/products/OB2020G-5A?sku=9215`,
          'error'
        );
        return;
      }

      const urls = entries.map(({ url }) => url);
      const urlsToFetch = urls.filter((url) => !isAlreadyFetched(url));

      if (urlsToFetch.length === 0) {
        renderResults(buildResultsFromUrls(urls));
        showStatus('ไม่มี URL ใหม่ — แสดงผลลัพธ์ที่มีอยู่แล้ว', 'info');
        return;
      }

      setLoading(true);
      showStatus('กำลังดึงข้อมูล...', 'loading');

      for (let i = 0; i < urlsToFetch.length; i++) {
        const pageUrl = urlsToFetch[i];
        const normalized = normalizeUrl(pageUrl);
        const sku = getSkuFromUrl(pageUrl);
        showStatus(`กำลังดึง ${i + 1}/${urlsToFetch.length} — SKU: ${sku || '?'}`, 'loading');

        try {
          const imageUrl = await fetchImageUrl(pageUrl);
          fetchedCache.set(normalized, { sku, imageUrl });
        } catch (err) {
          fetchedCache.set(normalized, { sku, error: err.message });
        }

        renderResults(buildResultsFromUrls(urls));
      }

      const newResults = urlsToFetch.map((url) => fetchedCache.get(normalizeUrl(url)));
      const newErrors = newResults.filter((r) => r.error).length;
      showStatus(
        newErrors > 0
          ? `เสร็จสิ้น — ดึงใหม่ ${urlsToFetch.length} รายการ (สำเร็จ ${urlsToFetch.length - newErrors}/${urlsToFetch.length})`
          : `เสร็จสิ้น — ดึงใหม่ ${urlsToFetch.length} รายการสำเร็จ`,
        newErrors > 0 ? 'error' : 'success'
      );
      setLoading(false);
    });

    // init
    for (let i = 0; i < 4; i++) {
      urlInputsContainer.appendChild(createUrlRow());
    }
    updateUrlCount();
  </script>
</body>
</html>
